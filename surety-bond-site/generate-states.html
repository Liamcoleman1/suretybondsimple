async function generateZip() {
  const log = document.getElementById('log');
  log.innerHTML = 'Generating ZIP file...<br>';

  const zip = new JSZip();

  states.forEach(s => {
    zip.file(s.slug + '.html', generateHTML(s));
    log.innerHTML += 'Added: ' + s.slug + '.html<br>';
  });

  log.innerHTML += '<br>Compressing...<br>';

  const blob = await zip.generateAsync({type: 'blob'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'state-pages.zip';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  log.innerHTML += '<br><strong>Done! state-pages.zip downloaded. Unzip the files into your states/ folder.</strong>';
}
</script>
